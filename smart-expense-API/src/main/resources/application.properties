# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_expense_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ← REMOVED dialect line (auto-detected, was causing WARN)
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.disable-swagger-default-url=true

# JWT Configuration
jwt.secret=SmartExpenseTrackerSecretKey2026VeryLongSecureKeyForHMACSHA256Algorithm
jwt.expiration=86400000
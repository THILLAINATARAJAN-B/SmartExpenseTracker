<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4" style="width: 400px;">
    <div class="text-center mb-4">
      <i class="bi bi-wallet2 text-primary" style="font-size: 3rem;"></i>
      <h3 class="mt-2 fw-bold">SmartExpense</h3>
      <p class="text-muted">Sign in to your account</p>
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
      <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
    </div>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email"
               name="email" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password"
               name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <i class="bi bi-box-arrow-in-right me-2" *ngIf="!loading"></i>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      Don't have an account?
      <a routerLink="/register" class="text-primary fw-semibold">Register</a>
    </p>
  </div>
</div>

<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4" style="width: 420px;">
    <div class="text-center mb-4">
      <i class="bi bi-person-plus text-success" style="font-size: 3rem;"></i>
      <h3 class="mt-2 fw-bold">Create Account</h3>
      <p class="text-muted">Start tracking your expenses</p>
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
      <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
    </div>
    <div class="alert alert-success" *ngIf="successMessage">
      <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
    </div>

    <form (ngSubmit)="register()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" class="form-control" [(ngModel)]="name"
               name="name" placeholder="John Doe" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email"
               name="email" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password"
               name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-success w-100" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      Already have an account?
      <a routerLink="/login" class="text-primary fw-semibold">Sign In</a>
    </p>
  </div>
</div>

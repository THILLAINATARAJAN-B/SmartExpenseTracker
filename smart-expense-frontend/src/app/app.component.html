<nav class="navbar navbar-expand-lg navbar-dark bg-dark" *ngIf="authService.isLoggedIn()">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/dashboard">
      <i class="bi bi-wallet2 me-2"></i>SmartExpense
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">  <!-- ← exact match -->
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/expenses"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">
            <i class="bi bi-cash-stack me-1"></i>Expenses
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/budgets"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">
            <i class="bi bi-pie-chart me-1"></i>Budgets
          </a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <span class="nav-link text-light">
            <i class="bi bi-person-circle me-1"></i>{{ authService.getUserName() }}
          </span>
        </li>
        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm ms-2" (click)="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>
